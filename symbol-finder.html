<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIUSF — Buscador de Símbolos Unicode</title>
<style>
:root{
  --bg:#0b0b12;--s1:#13131e;--s2:#1a1a2c;--s3:#22223a;
  --ac:#7c5cfc;--ac2:#a78bfa;--ac3:#c4b5fd;
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;
  --text:#e4e1ff;--muted:#6b6888;--border:#252540;
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:16px 14px 60px}
header{text-align:center;margin-bottom:20px;padding-top:4px}
.logo{font-size:1.5rem;font-weight:900;letter-spacing:-1px}
.logo span{color:var(--ac2)}
.tagline{font-size:.78rem;color:var(--muted);margin-top:3px}
.tagline b{color:var(--green)}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
#c{display:block;width:100%;height:190px;background:#07070f;border-radius:10px;border:2px solid var(--border);cursor:crosshair;touch-action:none;transition:border-color .2s}
#c.on{border-color:var(--ac)}
.bar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 15px;border-radius:9px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:.83rem;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.btn:hover{border-color:var(--ac);color:var(--ac3)}
.btn:disabled{opacity:.35;pointer-events:none}
.btn.go{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:700}
.btn.go:hover{background:var(--ac2)}
.status{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.78rem;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.dot.ok{background:var(--green)}.dot.run{background:var(--yellow);animation:blink 1s infinite}.dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pbar-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.pbar{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));width:0;transition:width .12s}
.best{text-align:center;padding:10px 0 16px}
.best-label{font-size:.68rem;color:var(--ac2);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:10px}
.best-char{font-size:5rem;line-height:1;display:block;cursor:pointer;transition:transform .15s;user-select:none}
.best-char:hover{transform:scale(1.08)}
.best-meta{font-size:.75rem;color:var(--ac2);font-weight:600;margin-top:6px}
.best-sub{font-size:.7rem;color:var(--muted);margin-top:2px}
.copy-btn{margin:12px auto 0;display:flex}
.score-row{display:flex;gap:7px;align-items:center;margin-bottom:13px;flex-wrap:wrap}
.pill{background:var(--s3);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:.7rem;color:var(--ac3)}
.sec-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:9px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:5px}
.sym{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 3px 6px;text-align:center;cursor:pointer;transition:all .15s}
.sym:hover{border-color:var(--ac);background:var(--s3)}
.sym.top{border-color:var(--ac)}
.sym .ch{font-size:1.45rem;display:block;line-height:1.2}
.sym .sc{font-size:.55rem;color:var(--ac2);font-weight:700;margin-top:2px}
.sym .u{font-size:.47rem;color:var(--muted)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ac);color:#fff;padding:9px 22px;border-radius:30px;font-size:.88rem;font-weight:700;transition:transform .25s;z-index:999;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#off{display:none}
</style>
</head>
<body>
<header>
  <div class="logo">DIU<span>SF</span></div>
  <div class="tagline">Motor: <b>DT² + HOG + 2-Stage</b> · <span id="gc">iniciando…</span> glifos indexados</div>
</header>

<div class="card">
  <canvas id="c" width="600" height="190"></canvas>
  <div class="bar">
    <button class="btn go" id="bSearch" disabled>🔍 Buscar</button>
    <button class="btn" id="bClear">🗑 Borrar</button>
    <button class="btn" id="bUndo">↩ Deshacer</button>
  </div>
  <div class="status"><div class="dot run" id="dot"></div><span id="stxt">Iniciando motor…</span></div>
  <div class="pbar-wrap"><div class="pbar" id="pb"></div></div>
</div>

<div id="rpanel" class="card" style="display:none">
  <div class="best" id="bestDiv"></div>
  <div class="score-row" id="scoreRow"></div>
  <div class="sec-lbl">▸ Alternativas similares</div>
  <div class="grid" id="grid"></div>
</div>

<canvas id="off" width="32" height="32"></canvas>
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIGURACIÓN
═══════════════════════════════════════════════════════ */
const SZ=32, TH=8;
const DTSZ=SZ*SZ, THSZ=TH*TH;
const HOG_C=4, HOG_B=8, HOG_SZ=HOG_C*HOG_C*HOG_B; // 128
const HOG_CS=SZ/HOG_C; // 8
const KEEP=350, RES_N=40;

const RANGES=[
  [33,126],[161,591],[688,767],[880,1327],[7424,7615],
  [7680,7935],[8192,8303],[8304,8351],[8352,8399],
  [8448,8527],[8528,8591],[8592,8703],[8704,8959],
  [8960,9215],[9216,9279],[9312,9471],[9472,9599],
  [9600,9631],[9632,9727],[9728,9983],[9984,10175],
  [10176,10239],[10496,10623],[10624,10751],
  [10752,11007],[11008,11263],[12288,12351],
  [12800,13055],[65281,65438],
  [119808,120831],[127744,128511],[128512,128591],
  [128640,128767],[128896,129023],[129280,129535],
];

/* ═══════════════════════════════════════════════════════
   ESTADO
═══════════════════════════════════════════════════════ */
let glyphCPs=[], matTH=null, matDT=null, matHOG=null;
let N=0, ready=false;
let strokes=[], cur=[], drawing=false;

/* ═══════════════════════════════════════════════════════
   CANVAS PRINCIPAL
═══════════════════════════════════════════════════════ */
const C=document.getElementById('c');
const ctx=C.getContext('2d');
ctx.strokeStyle='#a78bfa'; ctx.lineWidth=3;
ctx.lineCap='round'; ctx.lineJoin='round';

function pos(e){
  const r=C.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return [(s.clientX-r.left)*C.width/r.width,(s.clientY-r.top)*C.height/r.height];
}
function sd(e){drawing=true;const p=pos(e);cur=[p];ctx.beginPath();ctx.moveTo(...p);C.classList.add('on')}
function mv(e){if(!drawing)return;const p=pos(e);cur.push(p);ctx.lineTo(...p);ctx.stroke();ctx.beginPath();ctx.moveTo(...p)}
function ed(){if(!drawing)return;drawing=false;if(cur.length>1)strokes.push([...cur]);cur=[];C.classList.remove('on');updBtn()}
C.addEventListener('mousedown',sd);C.addEventListener('mousemove',mv);C.addEventListener('mouseup',ed);C.addEventListener('mouseleave',ed);
C.addEventListener('touchstart',e=>{e.preventDefault();sd(e)},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();mv(e)},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();ed()},{passive:false});

document.getElementById('bClear').onclick=()=>{
  ctx.clearRect(0,0,C.width,C.height);strokes=[];cur=[];
  document.getElementById('bSearch').disabled=true;
  document.getElementById('rpanel').style.display='none';
};
document.getElementById('bUndo').onclick=()=>{
  if(!strokes.length)return;strokes.pop();
  ctx.clearRect(0,0,C.width,C.height);
  strokes.forEach(s=>{ctx.beginPath();ctx.moveTo(s[0][0],s[0][1]);s.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.stroke()});
  updBtn();
};
document.getElementById('bSearch').onclick=()=>search();
function updBtn(){document.getElementById('bSearch').disabled=!(ready&&strokes.length>0)}

/* ═══════════════════════════════════════════════════════
   OFF-SCREEN CANVAS
═══════════════════════════════════════════════════════ */
const off=document.getElementById('off');
const oc=off.getContext('2d',{willReadFrequently:true});

function clrOff(){oc.fillStyle='#000';oc.fillRect(0,0,SZ,SZ)}
function px(){
  const d=oc.getImageData(0,0,SZ,SZ).data;
  const v=new Float32Array(DTSZ);
  for(let i=0;i<DTSZ;i++)v[i]=d[i*4]/255;
  return v;
}

/* ═══════════════════════════════════════════════════════
   RENDER GLIFO
═══════════════════════════════════════════════════════ */
function renderG(ch){
  clrOff();
  oc.fillStyle='#fff';
  oc.font=`${Math.round(SZ*.72)}px sans-serif`;
  oc.textAlign='center';oc.textBaseline='middle';
  oc.fillText(ch,SZ/2,SZ/2);
  return px();
}
function isValid(v){
  let w=0;for(let i=0;i<DTSZ;i++)if(v[i]>0.12)w++;
  return w>8&&w<DTSZ*.96;
}

/* ═══════════════════════════════════════════════════════
   NORMALIZAR DIBUJO USUARIO
═══════════════════════════════════════════════════════ */
function normUser(stks){
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  for(const s of stks)for(const [x,y] of s){
    if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;
  }
  const w=x1-x0||1,h=y1-y0||1;
  const sc=(SZ*.78)/Math.max(w,h);
  const ox=(SZ-w*sc)/2-x0*sc,oy=(SZ-h*sc)/2-y0*sc;
  clrOff();
  oc.strokeStyle='#fff';
  oc.lineWidth=Math.max(1.5,SZ*.05);
  oc.lineCap='round';oc.lineJoin='round';
  for(const s of stks){
    oc.beginPath();oc.moveTo(s[0][0]*sc+ox,s[0][1]*sc+oy);
    for(let i=1;i<s.length;i++)oc.lineTo(s[i][0]*sc+ox,s[i][1]*sc+oy);
    oc.stroke();
  }
  return px();
}

/* ═══════════════════════════════════════════════════════
   DISTANCE TRANSFORM — campo de proximidad (tolerante
   a diferencias trazo vs relleno)
═══════════════════════════════════════════════════════ */
function computeDT(v){
  const maxD=Math.ceil(SZ*.28);
  const d=new Float32Array(DTSZ);
  for(let i=0;i<DTSZ;i++)d[i]=v[i]>0.12?0:maxD+1;
  for(let y=0;y<SZ;y++)for(let x=0;x<SZ;x++){
    const i=y*SZ+x;
    if(x>0&&d[i-1]+1<d[i])d[i]=d[i-1]+1;
    if(y>0&&d[i-SZ]+1<d[i])d[i]=d[i-SZ]+1;
  }
  for(let y=SZ-1;y>=0;y--)for(let x=SZ-1;x>=0;x--){
    const i=y*SZ+x;
    if(x<SZ-1&&d[i+1]+1<d[i])d[i]=d[i+1]+1;
    if(y<SZ-1&&d[i+SZ]+1<d[i])d[i]=d[i+SZ]+1;
  }
  for(let i=0;i<DTSZ;i++)d[i]=Math.max(0,1-d[i]/maxD);
  return d;
}

/* ═══════════════════════════════════════════════════════
   HOG — captura direcciones de bordes (estructura forma)
   4×4 celdas, 8 bins orientación
═══════════════════════════════════════════════════════ */
function computeHOG(v){
  const h=new Float32Array(HOG_SZ);
  for(let y=1;y<SZ-1;y++)for(let x=1;x<SZ-1;x++){
    const gx=v[y*SZ+x+1]-v[y*SZ+x-1];
    const gy=v[(y+1)*SZ+x]-v[(y-1)*SZ+x];
    const mag=Math.sqrt(gx*gx+gy*gy);
    if(mag<0.04)continue;
    const ang=(Math.atan2(gy,gx)+Math.PI)/(2*Math.PI);
    const bin=Math.floor(ang*HOG_B)%HOG_B;
    const cy=Math.floor(y/HOG_CS),cx=Math.floor(x/HOG_CS);
    if(cy<HOG_C&&cx<HOG_C)h[(cy*HOG_C+cx)*HOG_B+bin]+=mag;
  }
  let s=0;for(let i=0;i<HOG_SZ;i++)s+=h[i]*h[i];
  s=Math.sqrt(s)+1e-7;
  for(let i=0;i<HOG_SZ;i++)h[i]/=s;
  return h;
}

/* ═══════════════════════════════════════════════════════
   THUMBNAIL — downsample SZ→TH para prefilter rápido
═══════════════════════════════════════════════════════ */
const SC=SZ/TH;
function computeTH(v){
  const t=new Float32Array(THSZ);
  for(let ty=0;ty<TH;ty++)for(let tx=0;tx<TH;tx++){
    let s=0;
    for(let dy=0;dy<SC;dy++)for(let dx=0;dx<SC;dx++)
      s+=v[(ty*SC+dy)*SZ+(tx*SC+dx)];
    t[ty*TH+tx]=s/(SC*SC);
  }
  return t;
}

/* ═══════════════════════════════════════════════════════
   SIMILITUD COSENO — inlined para máxima velocidad
═══════════════════════════════════════════════════════ */
function cosA(a,ai,b,bi,len){
  let dot=0,na=0,nb=0;
  for(let k=0;k<len;k++){
    const x=a[ai+k],y=b[bi+k];
    dot+=x*y;na+=x*x;nb+=y*y;
  }
  return na<1e-10||nb<1e-10?0:dot/Math.sqrt(na*nb);
}

/* ═══════════════════════════════════════════════════════
   INICIALIZACIÓN — indexar todos los glifos
═══════════════════════════════════════════════════════ */
async function buildDB(){
  setSt('run','Escaneando glifos Unicode…');
  const total=RANGES.reduce((a,[s,e])=>a+(e-s+1),0);
  let scanned=0;
  const valid=[];

  for(const [s,e] of RANGES){
    for(let cp=s;cp<=e;cp++){
      if(cp>=0xD800&&cp<=0xDFFF){scanned++;continue;}
      const v=renderG(String.fromCodePoint(cp));
      if(isValid(v))valid.push(cp);
      scanned++;
    }
    setPb(scanned/total*45);
    setSt('run',`Escaneando… ${scanned}/${total} · ${valid.length} válidos`);
    await tick();
  }

  N=valid.length;
  glyphCPs=valid;
  matTH =new Float32Array(N*THSZ);
  matDT =new Float32Array(N*DTSZ);
  matHOG=new Float32Array(N*HOG_SZ);

  for(let i=0;i<N;i++){
    const v=renderG(String.fromCodePoint(valid[i]));
    matTH.set(computeTH(v), i*THSZ);
    matDT.set(computeDT(v), i*DTSZ);
    matHOG.set(computeHOG(v),i*HOG_SZ);
    if(i%80===0){
      setPb(45+i/N*55);
      setSt('run',`Indexando… ${i}/${N} features calculadas`);
      await tick();
    }
  }

  document.getElementById('gc').textContent=`${N}`;
  setPb(100);
  setSt('ok',`Motor listo · ${N} glifos indexados`);
  ready=true;
  updBtn();
}

/* ═══════════════════════════════════════════════════════
   BÚSQUEDA — pipeline 2 etapas
═══════════════════════════════════════════════════════ */
function search(){
  if(!ready||!strokes.length)return;
  setSt('run','Buscando…');
  const t0=performance.now();

  const uV  =normUser(strokes);
  const uTH =computeTH(uV);
  const uDT =computeDT(uV);
  const uHOG=computeHOG(uV);

  /* Stage 1 — comparar thumbnails 8×8 (ultra rápido) */
  const s1=new Float32Array(N);
  for(let i=0;i<N;i++)s1[i]=cosA(uTH,0,matTH,i*THSZ,THSZ);

  /* Top KEEP índices */
  const idx=Array.from({length:N},(_,i)=>i)
    .sort((a,b)=>s1[b]-s1[a]).slice(0,KEEP);

  /* Stage 2 — DT + HOG sobre candidatos */
  const res=idx.map(i=>{
    const dts=cosA(uDT,0,matDT,i*DTSZ,DTSZ);
    const hgs=cosA(uHOG,0,matHOG,i*HOG_SZ,HOG_SZ);
    // Pesos calibrados: DT bridgea trazo↔relleno, HOG captura estructura
    return{
      cp:glyphCPs[i],
      ch:String.fromCodePoint(glyphCPs[i]),
      score:0.55*dts+0.30*hgs+0.15*s1[i],
      dts,hgs,th:s1[i]
    };
  });
  res.sort((a,b)=>b.score-a.score);

  const ms=(performance.now()-t0).toFixed(1);
  display(res.slice(0,RES_N),ms);
  setSt('ok',`${ms}ms · ${N} glifos comparados`);
}

/* ═══════════════════════════════════════════════════════
   DISPLAY
═══════════════════════════════════════════════════════ */
function display(res,ms){
  if(!res.length)return;
  document.getElementById('rpanel').style.display='block';
  const b=res[0];
  const ub=b.cp.toString(16).toUpperCase().padStart(4,'0');
  document.getElementById('bestDiv').innerHTML=`
    <div class="best-label">★ Mejor coincidencia</div>
    <span class="best-char" onclick="cp('${b.ch}')" title="Click para copiar">${b.ch}</span>
    <div class="best-meta">${Math.round(b.score*100)}% · U+${ub}</div>
    <div class="best-sub">DT ${Math.round(b.dts*100)}%  HOG ${Math.round(b.hgs*100)}%  Thumb ${Math.round(b.th*100)}%</div>
    <button class="btn go copy-btn" onclick="cp('${b.ch}')">📋 Copiar ${b.ch}</button>`;
  document.getElementById('scoreRow').innerHTML=`
    <div class="pill">⚡ ${ms}ms</div>
    <div class="pill">🔍 ${N} glifos</div>
    <div class="pill">2-Stage ${KEEP}→${RES_N}</div>
    <div class="pill">DT²+HOG+Thumb</div>`;
  const g=document.getElementById('grid');g.innerHTML='';
  for(let i=1;i<res.length;i++){
    const r=res[i];
    const u=r.cp.toString(16).toUpperCase().padStart(4,'0');
    const d=document.createElement('div');
    d.className='sym'+(i<=5?' top':'');
    d.innerHTML=`<span class="ch">${r.ch}</span><span class="sc">${Math.round(r.score*100)}%</span><span class="u">U+${u}</span>`;
    d.onclick=()=>cp(r.ch);
    g.appendChild(d);
  }
  document.getElementById('rpanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ═══════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════ */
function cp(ch){
  navigator.clipboard.writeText(ch).catch(()=>{});
  const t=document.getElementById('toast');
  t.textContent=`Copiado: ${ch}`;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function setSt(s,t){document.getElementById('dot').className='dot '+s;document.getElementById('stxt').textContent=t}
function setPb(p){document.getElementById('pb').style.width=p+'%'}
function tick(){return new Promise(r=>setTimeout(r,0))}

buildDB();
</script>
</body>
</html>
