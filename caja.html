<script>
'use strict';

/* ── THEME ── */
(function(){
  var icon = document.getElementById('theme-icon');
  var meta = document.getElementById('meta-theme');
  function apply(dark) {
    document.body.classList.toggle('dark', dark);
    document.documentElement.classList.remove('dark-early');
    if (icon) icon.textContent = dark ? '☀️' : '🌙';
    if (meta) meta.content = dark ? '#000' : '#f5f5f7';
    try { localStorage.setItem('diusf_theme', dark ? 'dark' : 'light'); } catch(_){}
  }
  try {
    var s = localStorage.getItem('diusf_theme');
    apply(s ? s==='dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
  } catch(_){ apply(false); }
  var btn = document.getElementById('theme-toggle');
  if (btn) btn.addEventListener('click', function(){ apply(!document.body.classList.contains('dark')); });
})();

/* ── TOAST ── */
var _tt;
function toast(msg) {
  var el = document.getElementById('caja-toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 1800);
}

/* ── CANVAS INSERT ── */
function insertIntoCanvas(text) {
  var ta = document.getElementById('canvas');
  if (!ta) return;
  var s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
  ta.value = v.slice(0, s) + text + v.slice(e);
  ta.selectionStart = ta.selectionEnd = s + text.length;
  ta.focus();
  updateStats();
}

function updateStats() {
  var ta = document.getElementById('canvas');
  var cc = document.getElementById('canvas-chars');
  var cl = document.getElementById('canvas-lines');
  if (!ta) return;
  var v = ta.value;
  if (cc) cc.textContent = [...v].length + ' caracteres';
  if (cl) cl.textContent = v ? v.split('\n').length + ' líneas' : '0 líneas';
}

document.getElementById('canvas').addEventListener('input', updateStats);

document.getElementById('canvas-copy').addEventListener('click', function(){
  var text = document.getElementById('canvas').value;
  if (!text) { toast('Canvas vacío'); return; }
  navigator.clipboard.writeText(text).then(function(){ toast('¡Copiado! ✓'); }).catch(function(){});
});

document.getElementById('canvas-clear').addEventListener('click', function(){
  var ta = document.getElementById('canvas');
  if (!ta.value) return;
  if (confirm('¿Limpiar el canvas?')) { ta.value = ''; updateStats(); }
});

/* ── PICKER TABS ── */
(function(){
  document.querySelectorAll('.ptab').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('.ptab').forEach(function(t){ t.classList.remove('active'); });
      document.querySelectorAll('.ppanel').forEach(function(p){ p.classList.remove('active'); });
      tab.classList.add('active');
      var p = document.getElementById('ppanel-' + tab.dataset.ptab);
      if (p) p.classList.add('active');
    });
  });
})();

(function(){
  var cats = document.getElementById('emoji-cats');
  var grid = document.getElementById('emoji-grid');
  var srch = document.getElementById('emoji-search');
  if (!cats) return;

  function tile(em, cont) {
    var b = document.createElement('button');
    b.className = 'ptile'; b.textContent = em;
    b.addEventListener('click', function(){ insertIntoCanvas(em); });
    cont.appendChild(b);
  }

  function renderCat(cat) {
    grid.innerHTML = '';
    (EMOJI_DB[cat]||[]).forEach(function(e){ tile(e,grid); });
  }

  Object.keys(EMOJI_DB).forEach(function(cat,i){
    var b = document.createElement('button');
    b.className='catbtn'+(i===0?' active':''); b.textContent=cat;
    b.addEventListener('click',function(){
      document.querySelectorAll('#emoji-cats .catbtn').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active'); renderCat(cat); srch.value='';
    });
    cats.appendChild(b);
  });

  srch.addEventListener('input',function(){
    var q=srch.value.toLowerCase().trim();
    if(!q){renderCat(Object.keys(EMOJI_DB)[0]);return;}
    var r=[];
    Object.keys(EMOJI_MAP).forEach(function(k){
      if(k.includes(q)||q.includes(k)){(EMOJI_MAP[k]||[]).forEach(function(e){if(!r.includes(e))r.push(e);});}
    });
    Object.values(EMOJI_DB).forEach(function(a){a.forEach(function(e){if(!r.includes(e))r.push(e);});});
    grid.innerHTML=''; r.slice(0,80).forEach(function(e){tile(e,grid);});
  });

  renderCat(Object.keys(EMOJI_DB)[0]);
})();

(function(){

  if(!cats)return;

    var b=document.createElement('button');

    b.addEventListener('click',function(){insertIntoCanvas(sym);});

  }

  function renderSym(cat){
    grid.innerHTML='';

  Object.keys(SYMBOLS).forEach(function(cat,i){
    var b=document.createElement('button');

/* ══ FUENTES ══ */
(function(){
  var input=document.getElementById('fuentes-input');
  var grid=document.getElementById('fuentes-grid');
  if(!input||!grid||!window.DIUSF)return;
  var convert=window.DIUSF.convert;
  var STYLES=window.DIUSF.STYLES;

  function render(){
    var txt=input.value||'Texto';
    grid.innerHTML='';
    STYLES.forEach(function(style){
      var out=convert(txt,style);
      var card=document.createElement('button');
      card.className='fuente-card';
      card.innerHTML='<span class="fn">'+style.name+'</span><span class="fp">'+out+'</span>';
      card.addEventListener('click',function(){insertIntoCanvas(out);toast('Fuente insertada ✓');});
      grid.appendChild(card);
    });
  }

  input.addEventListener('input',render);
  render();
})();
